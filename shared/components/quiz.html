<!--
  Quiz card component
  Source: pages/001-git-rebase-lab/index.html:618-827
  Pattern: card with data-drill; options carry data-correct; progress persists.
  Reactivity: document-style. Adapt STORAGE_KEY per page.
-->

<div class="quiz-card" data-drill="example-drill-1">
  <h3 class="quiz-title">Drill: pick the right command</h3>
  <p class="quiz-prompt">Question prompt goes here.</p>
  <div class="quiz-options">
    <button class="quiz-option" data-correct="false">Wrong answer</button>
    <button class="quiz-option" data-correct="true">Right answer</button>
    <button class="quiz-option" data-correct="false">Another wrong answer</button>
  </div>
  <div class="quiz-feedback" hidden></div>
</div>

<style>
  .quiz-card {
    padding: var(--space-5);
    background: var(--surface-color);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
  }
  .quiz-title { margin-bottom: var(--space-2); }
  .quiz-prompt { margin-bottom: var(--space-4); color: var(--text-muted); }
  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    margin-bottom: var(--space-4);
  }
  .quiz-option {
    padding: var(--space-3) var(--space-4);
    text-align: left;
    background: var(--surface-raised);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    color: var(--text-main);
    font: inherit;
    cursor: pointer;
    transition: var(--transition-fast);
  }
  .quiz-option:hover:not(:disabled) { border-color: var(--primary-color); }
  .quiz-option.correct {
    background: var(--success-soft);
    border-color: var(--success-color);
    color: var(--success-ink);
  }
  .quiz-option.wrong {
    background: var(--error-soft);
    border-color: var(--error-color);
    color: var(--error-ink);
  }
  .quiz-feedback {
    padding: var(--space-3);
    border-radius: var(--radius-sm);
    font-weight: 500;
  }
  .quiz-feedback.correct { background: var(--success-soft); color: var(--success-ink); }
  .quiz-feedback.wrong { background: var(--error-soft); color: var(--error-ink); }
</style>

<script>
  const QUIZ_STORAGE_KEY = 'quiz-progress';
  const progress = JSON.parse(localStorage.getItem(QUIZ_STORAGE_KEY) || '{}');

  function applyDrillCompleted(card) {
    card.querySelectorAll('.quiz-option').forEach((b) => {
      b.disabled = true;
      if (b.dataset.correct === 'true') b.classList.add('correct');
    });
    const fb = card.querySelector('.quiz-feedback');
    fb.textContent = 'Solved.';
    fb.classList.add('correct');
    fb.hidden = false;
  }

  document.querySelectorAll('.quiz-card').forEach((card) => {
    const id = card.dataset.drill;
    if (progress[id]) applyDrillCompleted(card);

    card.querySelectorAll('.quiz-option').forEach((btn) => {
      btn.addEventListener('click', () => {
        const correct = btn.dataset.correct === 'true';
        const fb = card.querySelector('.quiz-feedback');
        if (correct) {
          progress[id] = true;
          localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(progress));
          applyDrillCompleted(card);
        } else {
          btn.classList.add('wrong');
          fb.textContent = 'Not quite. Try again.';
          fb.classList.remove('correct');
          fb.classList.add('wrong');
          fb.hidden = false;
        }
      });
    });
  });
</script>
